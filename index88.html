<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>💬 Easy Bot — EasyPageX AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFE600;
    --yellow-hot: #FFB800;
    --yellow-deep: #CC9200;
    --black: #0A0A0A;
    --dark: #111111;
    --dark2: #1A1A1A;
    --dark3: #222222;
    --accent: #FF6B00;
    --cyan: #00F5FF;
    --white: #FFFFFF;
    --text-muted: #888888;
    --bubble-bot: #1E1E00;
    --bubble-user: #2A2A00;
    --glow: 0 0 20px rgba(255,230,0,0.4);
    --glow-strong: 0 0 40px rgba(255,230,0,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--black);
    font-family: 'Rajdhani', sans-serif;
    color: var(--white);
    overflow: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,230,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,230,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, #0D0D00 0%, #0A0A0A 100%);
    box-shadow: 0 0 60px rgba(255,230,0,0.15);
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1A1A00, #111100);
    border-bottom: 2px solid var(--yellow);
    padding: 14px 18px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--glow);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--yellow), var(--cyan), var(--yellow), transparent);
    animation: scanline 3s linear infinite;
  }

  @keyframes scanline {
    0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; }
  }

  .bot-avatar {
    width: 44px; height: 44px;
    background: var(--yellow);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: var(--glow-strong);
    flex-shrink: 0;
    animation: pulse-avatar 2s ease-in-out infinite;
  }

  @keyframes pulse-avatar {
    0%,100% { box-shadow: 0 0 20px rgba(255,230,0,0.5); }
    50% { box-shadow: 0 0 40px rgba(255,230,0,0.9), 0 0 80px rgba(255,230,0,0.3); }
  }

  .header-info { flex: 1; }

  .bot-name {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 16px;
    color: var(--yellow);
    letter-spacing: 2px;
    text-shadow: var(--glow);
  }

  .bot-status {
    font-size: 11px;
    color: var(--cyan);
    letter-spacing: 1px;
    display: flex; align-items: center; gap: 5px;
    margin-top: 2px;
  }

  .status-dot {
    width: 6px; height: 6px;
    background: #00FF88;
    border-radius: 50%;
    animation: blink 1.5s ease-in-out infinite;
  }

  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  .powered-by {
    font-size: 9px;
    color: var(--yellow-deep);
    font-family: 'Orbitron', monospace;
    text-align: right;
    letter-spacing: 1px;
  }

  /* CHAT AREA */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 3px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--yellow); border-radius: 2px; }

  /* MESSAGES */
  .msg {
    display: flex;
    gap: 8px;
    animation: fadeUp 0.3s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(10px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-icon {
    width: 30px; height: 30px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.bot .msg-icon {
    background: var(--yellow);
    box-shadow: 0 0 12px rgba(255,230,0,0.4);
  }

  .msg.user .msg-icon {
    background: var(--dark3);
    border: 1px solid rgba(255,230,0,0.3);
  }

  .msg-bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.55;
    font-weight: 400;
    letter-spacing: 0.2px;
  }

  .msg.bot .msg-bubble {
    background: linear-gradient(135deg, #1E1E00, #151500);
    border: 1px solid rgba(255,230,0,0.25);
    border-radius: 4px 14px 14px 14px;
    color: #F0E68C;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  .msg.user .msg-bubble {
    background: linear-gradient(135deg, #2A2000, #1A1500);
    border: 1px solid rgba(255,184,0,0.4);
    border-radius: 14px 4px 14px 14px;
    color: var(--yellow);
    text-align: right;
    font-weight: 600;
  }

  .msg-bubble strong {
    color: var(--yellow);
    font-weight: 700;
  }

  .msg-bubble .stat {
    display: inline-block;
    background: rgba(255,230,0,0.15);
    border: 1px solid rgba(255,230,0,0.3);
    border-radius: 4px;
    padding: 1px 6px;
    color: var(--yellow);
    font-weight: 700;
    font-size: 13px;
    margin: 2px 2px;
  }

  /* WELCOME */
  .welcome {
    text-align: center;
    padding: 10px 8px 4px;
    animation: fadeUp 0.5s ease forwards;
  }

  .welcome-title {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: var(--yellow);
    letter-spacing: 2px;
    margin-bottom: 6px;
    text-shadow: var(--glow);
  }

  .welcome-sub {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  /* QUICK QUESTIONS */
  #questions-panel {
    padding: 8px 14px 4px;
    flex-shrink: 0;
  }

  .q-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    color: var(--yellow-deep);
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .q-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .q-btn {
    background: linear-gradient(135deg, #1A1500, #0F0F00);
    border: 1px solid rgba(255,230,0,0.3);
    border-radius: 8px;
    padding: 8px 10px;
    color: rgba(255,230,0,0.85);
    font-family: 'Rajdhani', sans-serif;
    font-size: 11.5px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    line-height: 1.3;
    letter-spacing: 0.2px;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .q-btn:hover, .q-btn:active {
    background: linear-gradient(135deg, #2A2200, #1A1700);
    border-color: var(--yellow);
    color: var(--yellow);
    box-shadow: 0 0 12px rgba(255,230,0,0.2);
    transform: scale(0.98);
  }

  .q-btn.used {
    opacity: 0.4;
    pointer-events: none;
  }

  /* INPUT */
  #input-area {
    padding: 10px 14px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    background: linear-gradient(0deg, #0D0D00, #0A0A0A);
    border-top: 1px solid rgba(255,230,0,0.2);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  #user-input {
    flex: 1;
    background: #161600;
    border: 1px solid rgba(255,230,0,0.35);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--yellow);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  #user-input::placeholder { color: rgba(255,230,0,0.3); }

  #user-input:focus {
    border-color: var(--yellow);
    box-shadow: 0 0 16px rgba(255,230,0,0.2);
  }

  #send-btn {
    width: 42px; height: 42px;
    background: var(--yellow);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: var(--glow);
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }

  #send-btn:hover, #send-btn:active {
    background: var(--yellow-hot);
    box-shadow: var(--glow-strong);
    transform: scale(0.95);
  }

  /* Typing indicator */
  .typing {
    display: flex; align-items: center; gap: 4px;
    padding: 10px 14px;
  }

  .typing span {
    width: 6px; height: 6px;
    background: var(--yellow);
    border-radius: 50%;
    animation: bounce 1s ease-in-out infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%,100% { transform: translateY(0); opacity:0.4; }
    50% { transform: translateY(-5px); opacity:1; }
  }

  /* Divider */
  .divider {
    text-align: center;
    font-size: 10px;
    color: rgba(255,230,0,0.25);
    font-family: 'Orbitron', monospace;
    letter-spacing: 2px;
    margin: 4px 0;
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="bot-avatar">⚡</div>
    <div class="header-info">
      <div class="bot-name">EASY BOT</div>
      <div class="bot-status">
        <span class="status-dot"></span>
        ONLINE · READY TO HELP
      </div>
    </div>
    <div class="powered-by">POWERED BY<br>EASYPAGEX</div>
  </header>

  <div id="chat">
    <div class="welcome">
      <div class="welcome-title">⚡ HELLO, I'M EASY BOT</div>
      <div class="welcome-sub">Your EasyPageX AI expert — ask me anything about landing pages, conversions & growth.</div>
    </div>
    <div class="divider">── TAP A QUESTION OR TYPE BELOW ──</div>
  </div>

  <div id="questions-panel">
    <div class="q-label">⚡ Top Questions</div>
    <div class="q-grid" id="q-grid"></div>
  </div>

  <div id="input-area">
    <input id="user-input" type="text" placeholder="Ask me anything…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="send-btn">➤</button>
  </div>

</div>

<script>
const QA = [
  {
    q: "Why do I need a landing page?",
    a: `<strong>Your landing page is your #1 salesperson — working 24/7.</strong><br><br>
Unlike a generic homepage that tries to do everything, a dedicated landing page is laser-focused on ONE goal: turning visitors into customers.<br><br>
📊 Key stats:<br>
<span class="stat">5× more conversions</span> vs a generic homepage<br>
<span class="stat">80%</span> of businesses without a landing page lose customers daily<br>
<span class="stat">48% more leads</span> with great visuals on your page<br><br>
EasyPageX builds pages that capture attention, communicate your value, and drive action — fast.`
  },
  {
    q: "How do landing pages increase sales?",
    a: `<strong>One clear focus = less friction = more revenue.</strong><br><br>
A landing page removes distractions. There's one call-to-action: Buy, Sign Up, Book a Call. That clarity slashes decision paralysis and directly lifts conversions.<br><br>
📊 What the data says:<br>
<span class="stat">96%</span> of visitors don't buy on the first visit<br>
<span class="stat">5×</span> higher conversion rate vs homepage<br><br>
EasyPageX pages are designed with conversion-optimised layouts, compelling copy, and social proof — every element built to move people forward.`
  },
  {
    q: "What about capturing leads?",
    a: `<strong>Most visitors leave — but a landing page keeps them in your funnel.</strong><br><br>
Since <span class="stat">96%</span> of visitors won't buy immediately, email capture is critical. EasyPageX pages collect emails so you can follow up, nurture trust, and win them back when they're ready.<br><br>
💡 Your email list becomes your most valuable asset — owned by you, not rented from social media algorithms. Every lead captured is potential revenue that would otherwise be lost forever.`
  },
  {
    q: "Can it grow my social media?",
    a: `<strong>Yes — your landing page becomes a growth hub for all your channels.</strong><br><br>
EasyPageX cross-links your Instagram, X (Twitter), and LinkedIn directly in your page. Every visitor can become a follower across multiple platforms — growing your community <span class="stat">24/7</span>, automatically.<br><br>
🚀 Instead of sending traffic to one platform, you multiply reach. A visitor from Google Ads becomes an Instagram follower AND an email subscriber in one visit.`
  },
  {
    q: "How fast can I launch?",
    a: `<strong>From zero to live in days — not weeks.</strong><br><br>
The EasyPageX process is 4 simple steps:<br><br>
<strong>1.</strong> 💬 Tell us your vision (minutes)<br>
<strong>2.</strong> ✍️ We design your page (custom, mobile-first)<br>
<strong>3.</strong> 🔍 You review & approve (tweaks included)<br>
<strong>4.</strong> 🚀 Go live — customers start arriving from day one<br><br>
<span class="stat">Results from day one</span> — no long dev cycles, no tech headaches. You focus on your business; we handle the rest.`
  },
  {
    q: "Is it mobile-friendly?",
    a: `<strong>100% mobile-first — always.</strong><br><br>
EasyPageX designs every landing page mobile-first. With over <span class="stat">60%</span> of web traffic coming from smartphones, a page that doesn't look perfect on mobile is leaving money on the table.<br><br>
📱 Every page is:<br>
• Fast-loading on mobile networks<br>
• Touch-optimised buttons & forms<br>
• Responsive across all screen sizes<br>
• Boosted for Google mobile ranking<br><br>
Your page will look stunning on iPhone, Android, and every device.`
  },
  {
    q: "How does it drive targeted traffic?",
    a: `<strong>Direct every ad click to a page built to convert — not your cluttered homepage.</strong><br><br>
When you run ads on Instagram, Google, or X, sending traffic to your homepage wastes money. Your homepage has too many distractions.<br><br>
EasyPageX landing pages are purpose-built for each traffic source:<br>
<span class="stat">↑ Ad ROI</span> — every click lands on a relevant, focused page<br>
<span class="stat">↓ Bounce rate</span> — visitors see exactly what they searched for<br>
<span class="stat">↑ Quality score</span> — Google rewards landing page relevance with lower ad costs<br><br>
Targeted traffic + targeted page = maximum revenue per click.`
  },
  {
    q: "What makes EasyPageX different?",
    a: `<strong>Speed, results, and zero technical headaches.</strong><br><br>
EasyPageX is built specifically for small businesses that need results fast — without hiring a full dev team or wrestling with complicated tools.<br><br>
✅ Custom design (not templates)<br>
✅ Conversion-optimised from day one<br>
✅ Mobile-first, fast-loading<br>
✅ Social media cross-linking built in<br>
✅ Review & approve before going live<br>
✅ Tweaks included — no surprise costs<br><br>
<span class="stat">48% more leads</span> with great visuals. EasyPageX delivers that professional edge that turns browsers into buyers.`
  }
];

const chatEl = document.getElementById('chat');
const qGrid = document.getElementById('q-grid');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

// Build question buttons
QA.forEach((item, i) => {
  const btn = document.createElement('button');
  btn.className = 'q-btn';
  btn.textContent = item.q;
  btn.dataset.index = i;
  btn.addEventListener('click', () => handleQuestion(item.q, item.a, btn));
  qGrid.appendChild(btn);
});

function appendMsg(role, html) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = role === 'bot' ? '⚡' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = html;

  div.appendChild(icon);
  div.appendChild(bubble);
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-msg';

  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = '⚡';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

  div.appendChild(icon);
  div.appendChild(bubble);
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-msg');
  if (t) t.remove();
}

function handleQuestion(question, answer, btn) {
  if (btn) btn.classList.add('used');
  appendMsg('user', question);
  showTyping();
  setTimeout(() => {
    removeTyping();
    appendMsg('bot', answer);
  }, 700 + Math.random() * 400);
}

function handleFreeInput() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';

  // Try to match a known question
  const lower = text.toLowerCase();
  let matched = null;

  for (let item of QA) {
    const keywords = item.q.toLowerCase().split(' ').filter(w => w.length > 3);
    const hits = keywords.filter(k => lower.includes(k));
    if (hits.length >= 2 || lower.includes(item.q.toLowerCase().slice(0, 12))) {
      matched = item;
      break;
    }
  }

  appendMsg('user', text);
  showTyping();

  setTimeout(() => {
    removeTyping();
    if (matched) {
      appendMsg('bot', matched.a);
    } else {
      // Smart fallback based on keywords
      let fallback = getFallback(lower);
      appendMsg('bot', fallback);
    }
  }, 600 + Math.random() * 500);
}

function getFallback(lower) {
  if (lower.includes('price') || lower.includes('cost') || lower.includes('cheap') || lower.includes('how much')) {
    return `<strong>Great question on pricing!</strong><br><br>EasyPageX offers fast, custom landing pages built for small businesses. For specific pricing details, the best step is to reach out directly at <strong>easypagex.github.io</strong> — they'll tailor a solution to your budget and goals.<br><br>What you get: custom design, mobile-first, conversions optimised, and tweaks included. <span class="stat">Results from day one.</span>`;
  }
  if (lower.includes('time') || lower.includes('long') || lower.includes('quick') || lower.includes('fast')) {
    return `<strong>EasyPageX is built for speed.</strong><br><br>The process goes: vision → design → review → launch. Most pages go live in days, not weeks. You review and approve before anything goes live. <span class="stat">Customers start arriving from day one.</span>`;
  }
  if (lower.includes('contact') || lower.includes('reach') || lower.includes('email') || lower.includes('talk')) {
    return `<strong>Connect with EasyPageX:</strong><br><br>🌐 Website: <strong>easypagex.github.io</strong><br>📸 Instagram: <strong>@EasyPageX</strong><br>🐦 Twitter/X: <strong>@EasyPageX</strong><br>💼 LinkedIn: <strong>Ivan Alvarez Paniagua</strong><br><br>They respond fast — tap any of the 8 questions below for detailed info on what EasyPageX can do for your business!`;
  }
  if (lower.includes('seo') || lower.includes('google') || lower.includes('search')) {
    return `<strong>Landing pages boost your Google presence too.</strong><br><br>A well-structured landing page with relevant keywords improves your organic search ranking. EasyPageX pages are built with SEO best practices, fast load times (a Google ranking factor), and clean code — giving you visibility in search results on top of paid traffic. <span class="stat">More visibility = more conversions.</span>`;
  }
  return `<strong>I'm Easy Bot, your EasyPageX expert! ⚡</strong><br><br>I have detailed answers to the 8 most important questions about landing pages, conversions, and growing your business with EasyPageX.<br><br>Tap any of the question buttons below, or try asking about:<br>• <em>Why I need a landing page</em><br>• <em>How to capture more leads</em><br>• <em>Growing social media</em><br>• <em>How fast I can launch</em><br><br>What would you like to know? 🚀`;
}

sendBtn.addEventListener('click', handleFreeInput);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') handleFreeInput(); });

// Welcome message after slight delay
setTimeout(() => {
  appendMsg('bot', `<strong>Welcome! I'm Easy Bot ⚡</strong><br><br>I know everything about EasyPageX — landing pages, conversions, lead capture, and small business growth.<br><br>Tap any question below or ask me anything!`);
}, 400);
</script>
</body>
</html>
