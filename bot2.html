<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easy Bot — EasyPageX AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --y1: #FFE500;
    --y2: #FFF176;
    --y3: #F9C900;
    --y4: #FFEC4F;
    --black: #090909;
    --dark: #111;
    --dark2: #1a1a1a;
    --dark3: #222;
    --border: rgba(255,229,0,0.25);
    --glow: 0 0 18px rgba(255,229,0,0.55), 0 0 50px rgba(255,229,0,0.2);
    --glow-sm: 0 0 10px rgba(255,229,0,0.45);
    --cyan: #00f5e9;
    --orange: #ff6a00;
    --green: #39ff14;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  body {
    background: var(--y1);
    font-family: 'Rajdhani', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.09) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.09) 1px, transparent 1px);
    background-size: 44px 44px;
    z-index: 0;
    pointer-events: none;
    animation: gridshift 20s linear infinite;
  }

  @keyframes gridshift {
    0% { background-position: 0 0; }
    100% { background-position: 44px 44px; }
  }

  /* Radial vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 15% 15%, rgba(255,106,0,0.18) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 85%, rgba(0,245,233,0.12) 0%, transparent 50%);
    z-index: 0;
    pointer-events: none;
  }

  /* Scanline sweep */
  .scanline {
    position: fixed;
    top: -4px; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent 0%, var(--y1) 40%, transparent 100%);
    opacity: 0.5;
    z-index: 100;
    pointer-events: none;
    animation: scan 5s linear infinite;
  }
  @keyframes scan { from { top: -4px; } to { top: 100vh; } }

  /* ── SHELL ── */
  .shell {
    position: relative;
    z-index: 1;
    width: min(860px, 100vw);
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 12px;
  }

  /* ── HEADER ── */
  .header {
    flex-shrink: 0;
    background: var(--black);
    border: 2px solid var(--y1);
    border-radius: 3px;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--glow), 5px 5px 0 var(--y3);
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--y1);
    box-shadow: var(--glow);
  }

  .header-icon {
    width: 50px; height: 50px;
    background: var(--y1);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    animation: iconpulse 3s ease-in-out infinite;
    box-shadow: var(--glow-sm);
  }
  @keyframes iconpulse {
    0%,100% { box-shadow: 0 0 8px rgba(255,229,0,0.5); }
    50% { box-shadow: 0 0 28px rgba(255,229,0,1), 0 0 60px rgba(255,229,0,0.35); }
  }

  .header-info { flex: 1; }

  .header-info h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1rem, 3vw, 1.45rem);
    font-weight: 900;
    color: var(--y1);
    letter-spacing: 4px;
    text-shadow: var(--glow);
    line-height: 1;
  }

  .header-info p {
    font-size: 0.72rem;
    color: #666;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
    font-weight: 500;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 14px;
    border: 1px solid rgba(57,255,20,0.4);
    border-radius: 2px;
    background: rgba(57,255,20,0.07);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  .status-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.58rem;
    letter-spacing: 2px;
    color: var(--green);
  }

  /* corner decorations */
  .corner {
    position: absolute;
    width: 14px; height: 14px;
    border-color: var(--y3);
    border-style: solid;
    opacity: 0.7;
  }
  .corner-tr { top: 6px; right: 6px; border-width: 2px 2px 0 0; }
  .corner-br { bottom: 6px; right: 6px; border-width: 0 2px 2px 0; }

  /* ── CHAT WINDOW ── */
  .chat-window {
    flex: 1;
    min-height: 0;
    background: var(--dark);
    border: 2px solid var(--y1);
    border-radius: 3px;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: var(--glow), inset 0 0 60px rgba(255,229,0,0.02);
    scroll-behavior: smooth;
  }

  .chat-window::-webkit-scrollbar { width: 5px; }
  .chat-window::-webkit-scrollbar-track { background: var(--dark2); }
  .chat-window::-webkit-scrollbar-thumb { background: var(--y3); border-radius: 3px; }

  /* ── MESSAGES ── */
  .msg-row {
    display: flex;
    gap: 10px;
    animation: msgIn 0.28s cubic-bezier(.22,.68,0,1.2) both;
  }
  @keyframes msgIn { from { opacity:0; transform: translateY(12px) scale(0.97); } to { opacity:1; transform: none; } }

  .msg-row.user { flex-direction: row-reverse; align-self: flex-end; max-width: 80%; }
  .msg-row.bot  { align-self: flex-start; max-width: 85%; }

  .msg-ava {
    width: 32px; height: 32px;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    align-self: flex-end;
  }
  .msg-row.bot .msg-ava  { background: var(--y1); box-shadow: var(--glow-sm); }
  .msg-row.user .msg-ava { background: var(--dark3); border: 1px solid var(--border); }

  .msg-body { display: flex; flex-direction: column; gap: 3px; }

  .msg-tag {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.55;
    padding: 0 2px;
  }
  .msg-row.bot  .msg-tag { color: var(--y1); }
  .msg-row.user .msg-tag { color: #888; text-align: right; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 3px;
    font-size: 0.95rem;
    line-height: 1.65;
    font-weight: 400;
  }

  .msg-row.bot .msg-bubble {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--y1);
    color: #f0f0f0;
  }

  .msg-row.user .msg-bubble {
    background: var(--y1);
    color: var(--black);
    font-weight: 600;
    border-right: 3px solid var(--y3);
  }

  /* quick chips */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 10px;
  }

  .chip {
    background: transparent;
    border: 1px solid rgba(255,229,0,0.35);
    color: var(--y1);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 5px 13px;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.18s;
  }
  .chip:hover {
    background: var(--y1);
    color: var(--black);
    box-shadow: var(--glow-sm);
    transform: translateY(-1px);
  }

  /* typing indicator */
  .typing-row {
    display: flex;
    gap: 10px;
    align-self: flex-start;
    animation: msgIn 0.28s both;
  }
  .typing-bubble {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--y1);
    border-radius: 3px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .tdot {
    width: 7px; height: 7px;
    background: var(--y1);
    border-radius: 50%;
    animation: tdot 1.1s ease-in-out infinite;
  }
  .tdot:nth-child(2) { animation-delay: .18s; }
  .tdot:nth-child(3) { animation-delay: .36s; }
  @keyframes tdot {
    0%,60%,100% { transform: translateY(0); opacity: 0.35; }
    30% { transform: translateY(-7px); opacity: 1; }
  }

  /* ── INPUT BAR ── */
  .input-bar {
    flex-shrink: 0;
    background: var(--black);
    border: 2px solid var(--y1);
    border-radius: 3px;
    padding: 13px 18px;
    display: flex;
    gap: 12px;
    align-items: center;
    box-shadow: var(--glow), 5px 5px 0 var(--y3);
    position: relative;
  }

  .input-bar input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #f5f5f5;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    caret-color: var(--y1);
    letter-spacing: 0.3px;
  }
  .input-bar input::placeholder { color: #555; }

  .send-btn {
    background: var(--y1);
    border: none;
    color: var(--black);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 2.5px;
    padding: 10px 20px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .send-btn:hover {
    background: var(--y2);
    box-shadow: var(--glow);
    transform: translateY(-1px);
  }
  .send-btn:active { transform: translateY(0); }

  /* ── FOOTER ── */
  .footer {
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.5rem;
    letter-spacing: 2px;
    color: rgba(0,0,0,0.35);
    padding: 0 2px;
  }
  .footer a { color: inherit; text-decoration: none; opacity: 0.6; }
  .footer a:hover { opacity: 1; }

  .visit-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: transparent;
    border: 2px solid var(--y1);
    color: var(--y1);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    padding: 9px 16px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
    flex-shrink: 0;
    box-shadow: 0 0 10px rgba(255,229,0,0.2);
  }
  .visit-btn:hover {
    background: var(--y1);
    color: var(--black);
    box-shadow: var(--glow);
    transform: translateY(-1px);
  }
  .visit-btn:active { transform: none; }
  .visit-btn .arrow { font-size: 0.9rem; transition: transform 0.18s; }
  .visit-btn:hover .arrow { transform: translateX(3px); }

  @media (max-width: 500px) {
    .shell { padding: 10px; gap: 8px; }
    .status-label { display: none; }
    .msg-row.user, .msg-row.bot { max-width: 96%; }
    .header { padding: 10px 14px; gap: 10px; }
    .visit-btn span:not(.arrow) { display: none; }
    .visit-btn { padding: 9px 12px; }
  }

  /* iPhone & mobile optimisation */
  @media (max-width: 768px) {
    body { overflow: auto; }

    .shell {
      width: 100%;
      height: 100dvh;
      padding: 8px;
      gap: 8px;
    }

    .header {
      padding: 10px;
      gap: 8px;
      flex-wrap: wrap;
    }

    .header-icon {
      width: 40px;
      height: 40px;
      font-size: 20px;
    }

    .header-info h1 {
      font-size: 1rem;
      letter-spacing: 2px;
    }

    .header-info p {
      font-size: 0.6rem;
      letter-spacing: 1px;
    }

    .visit-btn {
      width: 100%;
      justify-content: center;
    }

    .chat-window {
      padding: 12px;
    }

    .msg-row.user,
    .msg-row.bot {
      max-width: 100%;
    }

    .msg-bubble {
      font-size: 1rem;
      line-height: 1.6;
      padding: 12px;
    }

    .chips {
      display: grid;
      grid-template-columns: 1fr;
    }

    .chip {
      width: 100%;
      text-align: left;
      padding: 10px;
      font-size: 0.9rem;
    }

    .input-bar {
      padding: 10px;
      gap: 8px;
    }

    .input-bar input {
      font-size: 16px;
    }

    .send-btn {
      padding: 10px 14px;
      font-size: 0.55rem;
    }

    .footer {
      display: none;
    }
  }

  @media (max-width: 430px) {
    .header-info p {
      display: none;
    }

    .status-pill {
      display: none;
    }

    .msg-bubble {
      font-size: 0.95rem;
    }
  }

</style>
</head>

const chatWin = document.getElementById('chatWin');
const inp = document.getElementById('inp');

/* ─── DOM HELPERS ────────────────────────────────────────────────────── */
function scrollBot() { chatWin.scrollTop = chatWin.scrollHeight; }

function addMessage(role, html, showChips) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const ava = document.createElement('div');
  ava.className = 'msg-ava';
  ava.textContent = role === 'bot' ? '⚡' : '👤';

  const body = document.createElement('div');
  body.className = 'msg-body';

  const tag = document.createElement('div');
  tag.className = 'msg-tag';
  tag.textContent = role === 'bot' ? 'EASY BOT' : 'YOU';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = html.replace(/\n/g, '<br>');

  body.appendChild(tag);
  body.appendChild(bubble);

  if (showChips) {
    const chips = document.createElement('div');
    chips.className = 'chips';
    const qs = [
      'What is EasyPageX?',
      'Why is a dedicated landing page considered your best salesperson?',
      'How does a landing page compare to a generic homepage?',
      'What happens to businesses that don’t have a landing page?',
      'What improvement in leads can great visuals provide?',
      'Why do you need a landing page?',
      'How does a landing page help with targeted traffic?',
      'How can a landing page boost social media profiles?',
      'How does a landing page generate more sales?',
      'Why is lead capture important?',
      'Is creating a landing page difficult?',
      'What is the first step?',
      'What happens after sharing my vision?',
      'Can I review the page before launch?',
      'What is the final step after approval?',
      'Who is EasyPageX designed for?',
      'How quickly can I go live?'
    ];
    qs.forEach(q => {
      const c = document.createElement('button');
      c.className = 'chip';
      c.textContent = q;
      c.onclick = () => { inp.value = q; send(); };
      chips.appendChild(c);
    });
    body.appendChild(chips);
  }

  row.appendChild(ava);
  row.appendChild(body);
  chatWin.appendChild(row);
  scrollBot();
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typing';
  const ava = document.createElement('div');
  ava.className = 'msg-ava';
  ava.style.cssText = 'background:var(--y1);box-shadow:var(--glow-sm);width:32px;height:32px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;align-self:flex-end;';
  ava.textContent = '⚡';
  const bub = document.createElement('div');
  bub.className = 'typing-bubble';
  for (let i = 0; i < 3; i++) { const d = document.createElement('div'); d.className = 'tdot'; bub.appendChild(d); }
  row.appendChild(ava);
  row.appendChild(bub);
  chatWin.appendChild(row);
  scrollBot();
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

/* ─── API CALL ───────────────────────────────────────────────────────── */
async function callClaude(text) {
  history.push({ role: 'user', content: text });
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM,
      messages: history
    })
  });
  if (!res.ok) throw new Error('API error');
  const data = await res.json();
  const reply = data.content?.find(b => b.type === 'text')?.text || '';
  if (!reply) throw new Error('Empty');
  history.push({ role: 'assistant', content: reply });
  return reply;
}

/* ─── SEND ───────────────────────────────────────────────────────────── */
async function send() {
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.disabled = true;
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);
  showTyping();

  let reply;
  try {
    reply = await callClaude(text);
  } catch (_) {
    reply = localReply(text);
  }

  removeTyping();
  addMessage('bot', reply);
  inp.disabled = false;
  document.getElementById('sendBtn').disabled = false;
  inp.focus();
}

inp.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

/* ─── WELCOME ────────────────────────────────────────────────────────── */

  addMessage('bot',
    "Hey! ⚡ I'm <strong>Easy Bot</strong> — your AI guide to everything <strong>EasyPageX</strong>.\n\nAsk me about landing pages, our process, stats, pricing, or how to get started. Pick a question below or type your own!",
    true
  );
}, 350);
</script>
